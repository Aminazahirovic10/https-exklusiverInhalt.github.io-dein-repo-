<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rätsel – Frage 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8ecf3;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            max-width: 650px;
            margin: auto;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border-top: 10px solid #0033A0; /* KN Blau */
        }

        h2 {
            color: #0033A0;
            text-align: center;
        }

        select, button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            margin-top: 12px;
            border-radius: 8px;
            border: 2px solid #0033A0;
        }

        select {
            background: #f7f9fc;
            cursor: pointer;
        }

        button {
            background: #0033A0;
            color: white;
            border: none;
            font-weight: bold;
            transition: 0.25s;
        }

        button:hover {
            background: #001f60;
            transform: translateY(-2px);
        }

        .error {
            color: #c40000;
            display: none;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🧩 Firmenrätsel</h2>

    <p><b>Frage 4:</b> Was unterstützt die Umsetzung unseres Aspiration Frameworks?</p>

    <select id="answer">
        <option value="">Bitte auswählen…</option>
        <option>Ziele geheim halten</option>
        <option>Entscheidungen ohne Daten und Abstimmungen treffen</option>
        <option>Klare Kommunikation, Teamarbeit und regelmäßiges Feedback im Alltag.</option>
    </select>

    <button onclick="checkAnswer()">Weiter</button>

    <div id="error" class="error">Falsche Antwort – bitte nochmal versuchen!</div>
</div>

<script>
function checkAnswer() {
    const solution = "Klare Kommunikation, Teamarbeit und regelmäßiges Feedback im Alltag.";
    const answer = document.getElementById("answer").value.trim();

    if (answer === solution) {
        window.location.href = "https://drive.google.com/drive/folders/15ce5dawJwpKiTEx9b-_mn3uhDBqyDZjZ?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
